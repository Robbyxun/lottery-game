<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刮刮樂 Pro</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --gold: #ffa502;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f2f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card-container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
        }
        .scratch-box {
            position: relative;
            width: 300px;
            height: 150px;
            margin: 25px auto;
            border: 4px solid #f1f2f6;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
        }
        .prize-content {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            z-index: 1;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            touch-action: none;
            cursor: pointer;
        }
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .status { margin-top: 15px; color: #747d8c; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card-container">
    <h2 style="color: var(--secondary); margin-bottom: 5px;">Lottery</h2>
    <p style="margin: 0; color: #a4b0be;">試試你的手氣吧！</p>
    
    <div class="scratch-box">
        <div class="prize-content" id="prize">
            <span style="font-size: 14px; color: #747d8c;">獎項內容</span>
            <div id="prize-name">載入中...</div>
        </div>
        <canvas id="scratchCanvas" width="300" height="150"></canvas>
    </div>

    <button class="btn" onclick="reset()">再玩一次</button>
    <div class="status" id="status"></div>
</div>

<script>
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const prizeDisplay = document.getElementById('prize-name');
    const statusDisplay = document.getElementById('status');
    
    let isDrawing = false;
    let isFinished = false;

    const prizes = [
        "20元","10元", "50元", 
         "銘謝惠顧", "100元","1000元"
    ];

    function init() {
        isFinished = false;
        statusDisplay.innerText = "請刮開灰色區域";
        prizeDisplay.innerText = prizes[Math.floor(Math.random() * prizes.length)];
        
        // 繪製塗層
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 加上一點紋理效果
        ctx.fillStyle = '#95a5a6';
        for(let i=0; i<300; i++) {
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        }
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function scratch(e) {
        if (!isDrawing || isFinished) return;
        const pos = getMousePos(e);

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 18, 0, Math.PI * 2);
        ctx.fill();
        
        checkProgress();
    }

    // 檢測刮開比例
    function checkProgress() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        let transparent = 0;

        for (let i = 0; i < pixels.length; i += 4) {
            if (pixels[i + 3] < 128) transparent++;
        }

        const percent = (transparent / (canvas.width * canvas.height)) * 100;
        
        if (percent > 45) {
            isFinished = true;
            canvas.style.transition = "opacity 0.5s ease";
            canvas.style.opacity = "0";
            setTimeout(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                statusDisplay.innerText = "祝賀你！刮開成功！";
            }, 500);
        }
    }

    // 事件監聽
    ['mousedown', 'touchstart'].forEach(evt => 
        canvas.addEventListener(evt, (e) => { isDrawing = true; scratch(e); e.preventDefault(); }));
    ['mousemove', 'touchmove'].forEach(evt => 
        canvas.addEventListener(evt, (e) => { scratch(e); e.preventDefault(); }));
    ['mouseup', 'touchend'].forEach(evt => 
        canvas.addEventListener(evt, () => isDrawing = false));

    function reset() {
        // 1. 先把畫布變回不透明 (避免看到底下的新獎項)
        canvas.style.transition = "none"; 
        canvas.style.opacity = "1";
        
        // 2. 清除畫布並重新填滿灰色
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 3. 重新加入紋理
        ctx.fillStyle = '#95a5a6';
        for(let i=0; i<300; i++) {
            ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        }

        // 4. 等遮蓋完成了，再偷偷換掉底下的獎項文字
        setTimeout(() => {
            initPrize(); // 抽新獎項
            isFinished = false;
            isDrawing = false;
            statusDisplay.innerText = "請刮開灰色區域";
        }, 50); // 這裡給一個極短的延遲，確保畫面已經被遮住
    }

    // 建議將抽獎邏輯獨立出來
    function initPrize() {
        prizeDisplay.innerText = prizes[Math.floor(Math.random() * prizes.length)];
    }
    init();
</script>
</body>
</html>
